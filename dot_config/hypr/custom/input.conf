#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = en_azerty, en_colemak
    kb_options = caps:escape, level3(ralt_switch), grp:alt_shift_toggle
    kb_rules =
    repeat_delay = 600
    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = false
    force_no_accel = true
    touchpad {
        natural_scroll = false
    }
}
  device{
      name = ydotoold-virtual-device
      kb_layout = us
      kb_variant =
      kb_options =
  }

